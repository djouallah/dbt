name: 'aemo_electricity'
version: '1.0.0'

profile: 'aemo_electricity'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Env vars used:
  # - DBT_SCHEMA: schema name (default: mart)
  # - csv_archive_path, path_root: for abfss:// paths in Fabric
  # - download_limit: number of files to download per source (default: 2)
  

on-run-start:
  - "{% if flags.WHICH == 'run' %}CALL ducklake.set_option('rewrite_delete_threshold', 0){% endif %}"
  - "{% if flags.WHICH == 'run' %}CALL ducklake.set_option('target_file_size', '128MB'){% endif %}"
  - "{% if flags.WHICH == 'run' %}CALL ducklake.set_option('expire_older_than', '2 day'){% endif %}"


on-run-end:
  - "{% if flags.WHICH == 'run' %}CALL ducklake_rewrite_data_files('ducklake'){% endif %}"
  - "{% if flags.WHICH == 'run' %}CALL ducklake_merge_adjacent_files('ducklake'){% endif %}"
  - "{% if flags.WHICH == 'run' %}CALL ducklake_cleanup_old_files('ducklake', cleanup_all => true){% endif %}"
  - "{% if flags.WHICH == 'run' %}CALL delta_export(){% endif %}"

models:
  aemo_electricity:
    staging:
      +materialized: view
      +schema: landing
    dimensions:
      +materialized: table
    marts:
      +materialized: incremental
      +schema: landing

