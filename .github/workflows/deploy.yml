name: Deploy to Fabric

on:
  push:
    branches: [production]

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ROOT_PATH: az://dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-duckdb azure-storage-blob
      - name: Start Azurite
        run: |
          npm install -g azurite
          azurite-blob --silent --skipApiVersionCheck --blobPort 10000 &
          for i in $(seq 1 10); do nc -z 127.0.0.1 10000 && break || sleep 1; done
          python -c "
          from azure.storage.blob import BlobServiceClient
          c = BlobServiceClient.from_connection_string('DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;')
          c.create_container('dbt')
          "
      - run: dbt run --target ci
      - run: dbt test --target ci
      - run: dbt docs generate --target ci
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target

  lakehouse:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      first_deploy: ${{ steps.deploy.outputs.first_deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - id: deploy
        run: python deploy_to_fabric.py lakehouse

  files:
    needs: lakehouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py files

  initial-load:
    needs: [lakehouse, files]
    if: needs.lakehouse.outputs.first_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py initial_load

  notebook:
    needs: [files, initial-load]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py notebook

  semantic-model:
    needs: notebook
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py semantic_model

  pipeline:
    needs: semantic-model
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py pipeline

  schedule:
    needs: pipeline
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py schedule

  deploy-docs:
    needs: schedule
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
