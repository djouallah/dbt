name: Deploy to Fabric

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && 'test' || 'prod' }}

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ROOT_PATH: az://dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-duckdb azure-storage-blob
      - name: Start Azurite
        run: |
          npm install -g azurite
          azurite-blob --silent --skipApiVersionCheck --blobPort 10000 &
          for i in $(seq 1 10); do nc -z 127.0.0.1 10000 && break || sleep 1; done
          python -c "
          from azure.storage.blob import BlobServiceClient
          c = BlobServiceClient.from_connection_string('DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;')
          c.create_container('dbt')
          "
      - run: dbt run --target ci --project-dir dbt --profiles-dir dbt
      - run: dbt test --target ci --project-dir dbt --profiles-dir dbt
      - run: dbt docs generate --target ci --project-dir dbt --profiles-dir dbt
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dbt/target

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ms-fabric-cli
      - name: Login to Fabric CLI
        run: |
          fab config set encryption_fallback_enabled true
          FED_TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r '.value')
          fab auth login -t ${{ secrets.AZURE_TENANT_ID }} -u ${{ secrets.AZURE_CLIENT_ID }} --federated-token "$FED_TOKEN"
      - run: python deploy.py --env $DEPLOY_ENV

  deploy-docs:
    needs: deploy
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
