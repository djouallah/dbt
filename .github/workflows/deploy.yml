name: Deploy to Fabric

on:
  push:
    branches: [production]

permissions:
  id-token: write
  contents: read
  pages: write

env:
  WORKSPACE_ID: be079b0f-3416-4de2-9184-9c546bad223c

jobs:
  lakehouse:
    runs-on: ubuntu-latest
    outputs:
      first_deploy: ${{ steps.deploy.outputs.first_deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - id: deploy
        run: python deploy_to_fabric.py lakehouse

  files:
    needs: lakehouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py files

  initial-load:
    needs: [lakehouse, files]
    if: needs.lakehouse.outputs.first_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py initial_load

  notebook:
    needs: [files, initial-load]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py notebook

  semantic-model:
    needs: notebook
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py semantic_model

  pipeline:
    needs: semantic-model
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py pipeline

  schedule:
    needs: pipeline
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install azure-identity azure-storage-file-datalake requests PyJWT
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - run: python deploy_to_fabric.py schedule

  docs:
    needs: schedule
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-duckdb
      - run: dbt docs generate --target dev --profiles-dir .
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target

  deploy-docs:
    needs: docs
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
