name: 'aemo_electricity'
version: '1.0.0'

profile: 'aemo_electricity'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Env vars used:
  # - DBT_SCHEMA: schema name (default: aemo)
  # - csv_archive_path, path_root: for abfss:// paths in Fabric
  # - download_limit: number of files to download per source (default: 2)
  

on-run-start:
  - "SET preserve_insertion_order = false"
  - "INSTALL delta_export FROM 'https://djouallah.github.io/delta_export'"
  - "LOAD delta_export"
  - "CALL ducklake.set_option('rewrite_delete_threshold', 0)"
  - "CALL ducklake.set_option('target_file_size', '128MB')"
  - "{{ download() }}"


on-run-end:
  - "CALL ducklake_rewrite_data_files('ducklake')"
  - "CALL ducklake_merge_adjacent_files('ducklake')"
  - "CALL delta_export()"

models:
  aemo_electricity:
    dimensions:
      +materialized: table
    marts:
      +materialized: incremental

